<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EAD33"/>
      <stop offset="100%" stop-color="#1E8C24"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8F5E8" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#bg)"/>

  <!-- 外圈装饰环 -->
  <rect x="14" y="14" width="100" height="100" rx="20" ry="20"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Play 三角形 -->
  <polygon points="52,36 52,72 80,54" fill="white"/>

  <!-- Trace 折线 - 表示追踪/波形 -->
  <polyline points="40,88 52,88 58,78 64,96 70,82 76,92 82,88 88,88"
            fill="none" stroke="white" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Trace 终点圆点 -->
  <circle cx="88" cy="88" r="3.5" fill="white" opacity="0.9"/>
</svg>

name: Release

# 两种发版路径,自动选择:
#
# 路径 A — push main 自动发版:
#   1. push 到 main 时,自动分析 Conventional Commits 判定版本 bump
#   2. 更新 package.json + src/manifest.json 版本号,commit 回 main
#   3. 打 tag 并推送
#   4. 自动构建 + 创建 GitHub Release(带 changelog) + 上传 zip
#
# 路径 B — 手动 tag 发版:
#   1. 本地 git tag v0.x.x && git push origin v0.x.x
#   2. 自动构建 + 创建 GitHub Release(带 changelog) + 上传 zip

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================================
  # 路径 A: push main → 分析 commits → 自动 bump 版本 + 打 tag
  # ============================================================
  auto-release:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      skip: ${{ steps.release.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: release
        run: |
          set -euo pipefail

          # 获取上一个 tag 和新增的 commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "没有新 commit,跳过发版"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 判定 bump 级别: major(breaking) > minor(feat) > patch(fix/perf/refactor)
          BUMP=""
          if echo "$COMMITS" | grep -qE '^(feat!|fix!|refactor!|.*!:)' || echo "$COMMITS" | grep -qi 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor)(\(.+\))?:'; then
            BUMP="patch"
          else
            echo "没有 feat/fix 类 commit,跳过发版"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 计算新版本号
          if [ -z "$LAST_TAG" ]; then
            case "$BUMP" in
              major) NEW="1.0.0" ;;
              minor) NEW="0.1.0" ;;
              patch) NEW="0.0.1" ;;
            esac
          else
            VER="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
            # 处理非数字 suffix（如 1.2.3-rc1）
            PATCH="${PATCH%%-*}"
            MINOR="${MINOR%%-*}"
            MAJOR="${MAJOR%%-*}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "📦 新版本: v${NEW} (bump: ${BUMP})"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # 更新 package.json 和 src/manifest.json 的 version 字段
          node -e "
            const fs = require('fs');
            ['package.json', 'src/manifest.json'].forEach(f => {
              const data = JSON.parse(fs.readFileSync(f, 'utf8'));
              data.version = '${NEW}';
              fs.writeFileSync(f, JSON.stringify(data, null, 2) + '\n');
            });
            console.log('✅ 版本号已更新到 ${NEW}');
          "

          # 提交并推送版本号更新
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/manifest.json
          git commit -m "chore: release v${NEW}"
          git push origin HEAD:main

          # 打 tag(不触发递归 workflow,因为使用 GITHUB_TOKEN)
          git tag "v${NEW}"
          git push origin "v${NEW}"

  # ============================================================
  # 构建 + 创建 Release (路径 A 和 B 共用)
  # ============================================================
  build-and-publish:
    needs: auto-release
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (needs.auto-release.result == 'success' && needs.auto-release.outputs.skip == 'false'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 确定 tag
        id: tag
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ needs.auto-release.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}
          fetch-depth: 0

      - name: 生成 Release Notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            NOTES=$(git log --pretty=format:"* %s (%h)" --no-merges 2>/dev/null | grep -E '^\* (feat|fix):' || echo "首次发布")
          else
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"* %s (%h)" --no-merges 2>/dev/null | grep -E '^\* (feat|fix):')
          fi
          echo 'body<<EOF' >> "$GITHUB_OUTPUT"
          echo "## What's Changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run typecheck

      - name: 构建
        run: npm run build

      - name: 打包 zip
        run: |
          cd dist
          zip -r "../playwright-trace-viewer-${{ steps.tag.outputs.name }}.zip" .

      - name: 创建 Release 并上传 zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          ZIP="playwright-trace-viewer-${TAG}.zip"
          if gh release view "$TAG" &>/dev/null; then
            echo "release 已存在,更新 body 和 asset..."
            gh release edit "$TAG" --notes "${{ steps.notes.outputs.body }}"
            gh release upload "$TAG" "$ZIP" --clobber
          else
            echo "创建新 release..."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "${{ steps.notes.outputs.body }}" \
              "$ZIP"
          fi

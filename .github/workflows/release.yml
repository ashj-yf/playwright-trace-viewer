name: Release

# 两种发版路径,自动选择:
#
# 路径 A — release-please 自动发版 (push to main):
#   1. push 到 main 时,release-please 根据 Conventional Commits 自动开/更新 Release PR
#   2. 合并 Release PR 时,release-please 自动打 tag、创建 Release(带 changelog)、更新版本号
#   3. build job 自动构建并上传 zip 到该 Release
#
# 路径 B — 手动 tag 发版 (push tag v*):
#   1. 本地 git tag v0.x.x && git push origin v0.x.x
#   2. build-on-tag job 自动构建、创建 GitHub Release(带自动生成的 release notes)、上传 zip
#
# 日常推荐路径 A;需要紧急发版或自定义版本号时走路径 B。
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================================
  # 路径 A: release-please 检测 + 管理 Release PR
  # ============================================================
  release-please:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # ============================================================
  # 路径 A: release-please 创建 Release 后 → 构建 + 上传 zip
  # ============================================================
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run typecheck

      - name: 构建
        run: npm run build

      - name: 打包 zip
        run: |
          cd dist
          zip -r "../playwright-trace-viewer-${{ needs.release-please.outputs.tag_name }}.zip" .

      - name: 上传构建产物到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: playwright-trace-viewer-${{ needs.release-please.outputs.tag_name }}.zip

  # ============================================================
  # 路径 B: 手动推送 tag → 构建 + 创建 Release + 自动生成 release notes
  # ============================================================
  build-on-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0  # 获取完整历史，用于生成 release notes

      - name: 生成 Release Notes
        id: notes
        run: |
          # 获取上一个 tag(按时间倒序取第2个,即当前 tag 的前一个)
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          NOTES=$(git log $RANGE --pretty=format:"* %s (%h)" --no-merges 2>/dev/null || echo "首次发布")
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run typecheck

      - name: 构建
        run: npm run build

      - name: 打包 zip
        run: |
          cd dist
          zip -r "../playwright-trace-viewer-${{ github.ref_name }}.zip" .

      - name: 创建 Release 并上传 zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: playwright-trace-viewer-${{ github.ref_name }}.zip
          body: ${{ steps.notes.outputs.body }}
